<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A | THE HUNTERS</title>
    <meta name="description" content="THE HUNTERS 지원 및 활동 관련 비밀 Q&A 문의 페이지입니다.">
    <style>
        :root {
            --bg: #050506;
            --panel: rgba(12, 12, 15, 0.76);
            --border: rgba(255,255,255,0.11);
            --text: #fff;
            --dim: #b6b3bd;
            --purple: #8f55ff;
            --gold: #bfa469;
            --success: #7bd8a4;
            --danger: #ff8c8c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 50% 0%, rgba(143, 85, 255, 0.13), transparent 30rem),
                linear-gradient(180deg, #050506, #0a0a0d 54%, #0b0910);
            line-height: 1.6;
            animation: pageFadeIn 150ms ease-out both;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.026;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(255,255,255,0.95) 0 0.7px, transparent 0.8px),
                radial-gradient(circle at 72% 64%, rgba(255,255,255,0.72) 0 0.6px, transparent 0.7px);
            background-size: 5px 5px, 7px 7px;
            mix-blend-mode: soft-light;
        }

        nav {
            border-bottom: 1px solid var(--border);
            background: rgba(5, 5, 6, 0.84);
            backdrop-filter: blur(16px);
        }

        .nav-inner,
        main {
            width: min(1100px, calc(100% - 32px));
            margin: 0 auto;
        }

        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
        }

        .brand,
        .back {
            color: var(--text);
            text-decoration: none;
            font-weight: 800;
        }

        .back {
            color: var(--dim);
            font-size: 14px;
        }

        main {
            position: relative;
            z-index: 1;
            padding: 58px 0 80px;
        }

        .hero {
            margin-bottom: 28px;
        }

        .eyebrow {
            color: var(--gold);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        h1 {
            font-size: clamp(34px, 6vw, 58px);
            line-height: 1.05;
            margin-bottom: 14px;
        }

        .lead,
        .notice {
            color: var(--dim);
            max-width: 780px;
        }

        .notice {
            margin-top: 8px;
            font-size: 14px;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 0.86fr);
            gap: 18px;
            align-items: start;
        }

        .panel {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            padding: 22px;
        }

        .panel h2 {
            font-size: 22px;
            margin-bottom: 16px;
        }

        label {
            display: block;
            color: var(--dim);
            font-size: 12px;
            font-weight: 800;
            margin: 12px 0 6px;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.055);
            color: var(--text);
            padding: 12px;
            font-size: 14px;
        }

        textarea {
            min-height: 138px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: rgba(143, 85, 255, 0.52);
        }

        .check {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            color: var(--dim);
            font-size: 13px;
            margin-top: 14px;
        }

        .check input {
            width: auto;
            margin-top: 4px;
        }

        button {
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text);
            padding: 12px 14px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 100ms cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.2s, background 0.2s;
            will-change: transform;
            touch-action: manipulation;
        }

        button.primary {
            width: 100%;
            margin-top: 16px;
            border-color: rgba(143, 85, 255, 0.45);
            background: linear-gradient(135deg, var(--purple), #4a2f87);
        }

        .message {
            min-height: 22px;
            margin-top: 12px;
            color: var(--dim);
            font-size: 14px;
        }

        .message.error { color: var(--danger); }
        .message.success { color: var(--success); }

        .lookup-result,
        .code-box {
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 8px;
            padding: 14px;
            background: rgba(255,255,255,0.035);
            margin-top: 14px;
            color: var(--dim);
            white-space: pre-wrap;
        }

        .code-box strong {
            display: block;
            color: #fff;
            font-size: clamp(24px, 5vw, 36px);
            letter-spacing: 2px;
            line-height: 1.1;
            margin: 8px 0 12px;
        }

        .result-title {
            color: #fff;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .micro-pressable.is-pressed {
            transform: scale(0.975);
        }

        @keyframes pageFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            body {
                animation: none;
            }

            button {
                transition-duration: 1ms;
            }

            .micro-pressable.is-pressed {
                transform: none;
            }
        }

        @media (max-width: 820px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a class="brand" href="index.html">THE HUNTERS</a>
            <a class="back" href="index.html">홈으로</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="eyebrow">Private Q&A</div>
            <h1>비밀글 문의</h1>
            <p class="lead">지원 및 활동 관련 문의를 남겨주시면 운영진이 확인 후 답변드립니다.</p>
            <p class="notice">작성한 질문은 비밀글로 저장되며, 조회 코드와 비밀번호를 입력한 본인만 확인할 수 있습니다.</p>
        </section>

        <section class="layout">
            <form id="qaForm" class="panel">
                <h2>질문 남기기</h2>
                <label for="name">이름 또는 닉네임</label>
                <input id="name" name="name" required maxlength="30" autocomplete="name">

                <label for="password">비밀번호</label>
                <input id="password" name="password" type="password" required minlength="4" autocomplete="new-password">

                <label for="title">제목</label>
                <input id="title" name="title" required maxlength="80">

                <label for="content">질문 내용</label>
                <textarea id="content" name="content" required></textarea>

                <label class="check">
                    <input id="privacyConsent" name="privacyConsent" type="checkbox" required>
                    <span>질문 확인 및 답변을 위해 입력한 정보를 저장하는 데 동의합니다.</span>
                </label>

                <button class="primary" type="submit">질문 등록</button>
                <p id="formMessage" class="message"></p>
                <div id="codeResult"></div>
            </form>

            <form id="lookupForm" class="panel">
                <h2>내 질문 확인하기</h2>
                <p class="notice">질문 등록 후 발급된 조회 코드와 작성 시 입력한 비밀번호를 입력해 주세요.</p>

                <label for="lookupCode">조회 코드</label>
                <input id="lookupCode" name="lookupCode" required autocomplete="off" placeholder="예: HNTR-XXXXXX">

                <label for="lookupPassword">비밀번호</label>
                <input id="lookupPassword" name="password" type="password" required autocomplete="current-password">

                <button class="primary" type="submit">내 질문 확인</button>
                <p id="lookupMessage" class="message"></p>
                <div id="lookupResult"></div>
            </form>
        </section>
    </main>

    <script>
        const qaForm = document.getElementById("qaForm");
        const lookupForm = document.getElementById("lookupForm");
        const formMessage = document.getElementById("formMessage");
        const lookupMessage = document.getElementById("lookupMessage");
        const codeResult = document.getElementById("codeResult");
        const lookupResult = document.getElementById("lookupResult");
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
        let tapAudioContext;

        function playSoftTap() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                tapAudioContext ||= new AudioContext();
                const context = tapAudioContext;
                const now = context.currentTime;
                const oscillator = context.createOscillator();
                const gain = context.createGain();

                oscillator.type = "sine";
                oscillator.frequency.setValueAtTime(420, now);
                oscillator.frequency.exponentialRampToValueAtTime(220, now + 0.055);
                gain.gain.setValueAtTime(0.0001, now);
                gain.gain.exponentialRampToValueAtTime(0.036, now + 0.008);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.075);

                oscillator.connect(gain);
                gain.connect(context.destination);
                oscillator.start(now);
                oscillator.stop(now + 0.08);
            } catch (_) {
                // Optional feedback.
            }
        }

        function vibrateTap() {
            if ("vibrate" in navigator) navigator.vibrate(8);
        }

        function initMicroInteractions() {
            const pressSelector = "button";
            document.querySelectorAll(pressSelector).forEach((element) => element.classList.add("micro-pressable"));

            document.addEventListener("pointerdown", (event) => {
                const target = event.target.closest(pressSelector);
                if (!target || target.disabled || reduceMotion.matches) return;
                target.classList.add("is-pressed");
            });

            ["pointerup", "pointercancel", "pointerleave"].forEach((type) => {
                document.addEventListener(type, (event) => {
                    const target = event.target.closest(pressSelector);
                    if (target) target.classList.remove("is-pressed");
                });
            });

            document.addEventListener("click", (event) => {
                const target = event.target.closest(pressSelector);
                if (!target || target.disabled) return;
                vibrateTap();
                playSoftTap();
            });
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function setMessage(element, text, type = "") {
            element.textContent = text;
            element.className = `message ${type}`.trim();
        }

        qaForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            setMessage(formMessage, "등록 중입니다.");
            codeResult.innerHTML = "";
            const payload = Object.fromEntries(new FormData(qaForm).entries());
            payload.privacyConsent = document.getElementById("privacyConsent").checked;

            const response = await fetch("/api/qa", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });
            const result = await response.json().catch(() => null);

            if (!response.ok || !result?.ok) {
                setMessage(formMessage, result?.error || "질문 등록에 실패했습니다.", "error");
                return;
            }

            qaForm.reset();
            setMessage(formMessage, "질문이 접수되었습니다. 아래 조회 코드를 반드시 저장해주세요.", "success");
            codeResult.innerHTML = `
                <div class="code-box">
                    조회 코드
                    <strong>${escapeHtml(result.lookupCode)}</strong>
                    <button type="button" id="copyCodeBtn">조회 코드 복사</button>
                </div>
            `;
            document.getElementById("lookupCode").value = result.lookupCode;
            document.getElementById("copyCodeBtn").addEventListener("click", async () => {
                await navigator.clipboard?.writeText(result.lookupCode);
                setMessage(formMessage, "조회 코드가 복사되었습니다.", "success");
            });
        });

        lookupForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            setMessage(lookupMessage, "확인 중입니다.");
            lookupResult.innerHTML = "";
            const payload = Object.fromEntries(new FormData(lookupForm).entries());

            const response = await fetch("/api/qa/verify", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });
            const result = await response.json().catch(() => null);

            if (!response.ok || !result?.ok) {
                setMessage(lookupMessage, result?.error || "질문을 확인할 수 없습니다.", "error");
                return;
            }

            const item = result.item;
            lookupResult.innerHTML = `
                <div class="lookup-result">
                    <div class="result-title">${escapeHtml(item.title)}</div>
                    <div>${escapeHtml(item.content)}</div>
                    <h3 style="margin-top:18px;color:#fff">운영진 답변</h3>
                    <div>${item.answered ? escapeHtml(item.answer) : "관리자 답변 대기중"}</div>
                </div>
            `;
            setMessage(lookupMessage, "확인되었습니다.", "success");
        });

        initMicroInteractions();
    </script>
</body>
</html>
