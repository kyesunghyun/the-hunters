<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE HUNTERS Admin</title>
    <style>
        :root {
            --bg: #050506;
            --panel: rgba(14, 14, 18, 0.82);
            --panel-soft: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.12);
            --text: #fff;
            --dim: #b6b3bd;
            --purple: #8f55ff;
            --purple-soft: rgba(143, 85, 255, 0.12);
            --danger: #ff8c8c;
            --success: #7bd8a4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 50% 0%, rgba(143, 85, 255, 0.14), transparent 34rem),
                linear-gradient(180deg, #050506, #0a0a0d);
            color: var(--text);
            line-height: 1.5;
        }

        main {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 42px 0 70px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 20px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: clamp(28px, 5vw, 44px);
            letter-spacing: 0;
        }

        .sub {
            color: var(--dim);
            margin-top: 6px;
            font-size: 14px;
        }

        .panel {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            padding: 22px;
        }

        .login {
            max-width: 440px;
            margin-top: 28px;
        }

        .hidden {
            display: none !important;
        }

        label {
            display: block;
            color: var(--dim);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255,255,255,0.055);
            color: var(--text);
            padding: 11px 12px;
            font-size: 14px;
        }

        textarea {
            min-height: 88px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: rgba(143, 85, 255, 0.55);
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab,
        button {
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text);
            padding: 10px 13px;
            font-weight: 800;
            cursor: pointer;
        }

        .tab.active,
        button.primary {
            border-color: rgba(143, 85, 255, 0.45);
            background: linear-gradient(135deg, var(--purple), #4a2f87);
        }

        button.danger {
            color: var(--danger);
        }

        button.small {
            padding: 7px 10px;
            font-size: 12px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .item {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: var(--panel-soft);
            padding: 16px;
        }

        .item-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .item-title {
            color: #fff;
            font-weight: 800;
        }

        .fields {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .field-full {
            grid-column: 1 / -1;
        }

        .checks {
            display: flex;
            gap: 14px;
            align-items: center;
            margin-top: 12px;
            color: var(--dim);
            font-size: 13px;
        }

        .checks input {
            width: auto;
            margin-right: 6px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .message {
            min-height: 22px;
            color: var(--dim);
            font-size: 14px;
        }

        .message.success { color: var(--success); }
        .message.error { color: var(--danger); }

        .savebar {
            position: sticky;
            bottom: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-top: 18px;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(5, 5, 6, 0.92);
            backdrop-filter: blur(12px);
        }

        @media (max-width: 760px) {
            main {
                width: min(100% - 22px, 1120px);
                padding-top: 26px;
            }

            header,
            .toolbar,
            .savebar {
                align-items: flex-start;
                flex-direction: column;
            }

            .grid,
            .fields,
            .settings-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <div>
                <h1>THE HUNTERS Admin</h1>
                <p class="sub">숨김 관리자 페이지 · 직접 URL 접속 전용</p>
            </div>
            <button id="logoutBtn" class="hidden">로그아웃</button>
        </header>

        <section id="loginPanel" class="panel login">
            <label for="passwordInput">ADMIN_PASSWORD</label>
            <input id="passwordInput" type="password" autocomplete="current-password" placeholder="관리자 비밀번호">
            <div style="height:12px"></div>
            <button id="loginBtn" class="primary">로그인</button>
            <p id="loginMessage" class="message"></p>
        </section>

        <section id="adminPanel" class="hidden">
            <nav class="tabs" aria-label="관리 탭">
                <button class="tab active" data-tab="notices">공지사항</button>
                <button class="tab" data-tab="activities">활동기록</button>
                <button class="tab" data-tab="contact">연락처</button>
                <button class="tab" data-tab="ticker">뉴스티커</button>
                <button class="tab" data-tab="main">메인문구</button>
                <button class="tab" data-tab="qa">Q&A 관리</button>
            </nav>

            <section class="panel tab-panel" data-panel="notices">
                <div class="toolbar">
                    <h2 class="section-title">공지사항</h2>
                    <button class="primary" data-add="notices">공지 추가</button>
                </div>
                <div id="noticesList" class="grid"></div>
            </section>

            <section class="panel tab-panel hidden" data-panel="activities">
                <div class="toolbar">
                    <h2 class="section-title">활동기록</h2>
                    <button class="primary" data-add="activities">활동 추가</button>
                </div>
                <div id="activitiesList" class="grid"></div>
            </section>

            <section class="panel tab-panel hidden" data-panel="contact">
                <h2 class="section-title">연락처 관리</h2>
                <div class="settings-grid" style="margin-top:16px">
                    <div>
                        <label for="contactMessage">문의 안내 문구</label>
                        <textarea id="contactMessage"></textarea>
                    </div>
                    <div>
                        <label for="presidentPhone">회장 연락처</label>
                        <input id="presidentPhone" type="tel">
                    </div>
                    <div>
                        <label for="staffPhone">운영진 연락처</label>
                        <input id="staffPhone" type="tel">
                    </div>
                </div>
            </section>

            <section class="panel tab-panel hidden" data-panel="ticker">
                <div class="toolbar">
                    <h2 class="section-title">뉴스티커</h2>
                    <button class="primary" data-add="tickerItems">티커 추가</button>
                </div>
                <div id="tickerItemsList" class="grid"></div>
            </section>

            <section class="panel tab-panel hidden" data-panel="main">
                <h2 class="section-title">메인문구 관리</h2>
                <div class="settings-grid" style="margin-top:16px">
                    <div>
                        <label for="heroTitle">메인 제목</label>
                        <input id="heroTitle" type="text">
                    </div>
                    <div>
                        <label for="applyButtonText">지원 버튼 문구</label>
                        <input id="applyButtonText" type="text">
                    </div>
                    <div class="field-full">
                        <label for="heroSubtitle">서브 카피</label>
                        <textarea id="heroSubtitle"></textarea>
                    </div>
                    <div class="field-full">
                        <label for="legalNotice">지원자 유의사항 문구</label>
                        <textarea id="legalNotice" style="min-height:220px"></textarea>
                    </div>
                </div>
            </section>

            <section class="panel tab-panel hidden" data-panel="qa">
                <div class="toolbar">
                    <h2 class="section-title">Q&A 관리</h2>
                    <button class="primary" id="reloadQaBtn">Q&A 새로고침</button>
                </div>
                <div id="qaAdminList" class="grid"></div>
            </section>

            <div class="savebar">
                <p id="saveMessage" class="message"></p>
                <button id="saveBtn" class="primary">전체 저장</button>
            </div>
        </section>
    </main>

    <script>
        const tokenKey = "theHuntersAdminToken";
        let cms = {
            notices: [],
            activities: [],
            tickerItems: [],
            siteSettings: {},
            qaItems: [],
        };

        const $ = (selector) => document.querySelector(selector);
        const loginPanel = $("#loginPanel");
        const adminPanel = $("#adminPanel");
        const loginMessage = $("#loginMessage");
        const saveMessage = $("#saveMessage");
        const logoutBtn = $("#logoutBtn");

        function token() {
            return localStorage.getItem(tokenKey) || "";
        }

        function setMessage(element, text, type = "") {
            element.textContent = text;
            element.className = `message ${type}`.trim();
        }

        function emptyEntry() {
            return {
                id: crypto.randomUUID(),
                title: "",
                date: new Date().toISOString().slice(0, 10),
                summary: "",
                link: "",
                pinned: false,
                visible: true,
            };
        }

        function emptyTicker() {
            return {
                id: crypto.randomUUID(),
                text: "",
                visible: true,
                order: cms.tickerItems.length + 1,
            };
        }

        function authorizedFetch(url, options = {}) {
            return fetch(url, {
                ...options,
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token()}`,
                    ...(options.headers || {}),
                },
            });
        }

        async function login() {
            setMessage(loginMessage, "로그인 중...");
            const password = $("#passwordInput").value;
            const response = await fetch("/api/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password }),
            });
            const result = await response.json().catch(() => null);

            if (!response.ok || !result?.ok) {
                setMessage(loginMessage, result?.error || "로그인에 실패했습니다.", "error");
                return;
            }

            localStorage.setItem(tokenKey, result.token);
            setMessage(loginMessage, "");
            await loadCms();
        }

        async function loadCms() {
            const response = await authorizedFetch("/api/admin/cms");
            const result = await response.json().catch(() => null);

            if (!response.ok || !result?.ok) {
                localStorage.removeItem(tokenKey);
                loginPanel.classList.remove("hidden");
                adminPanel.classList.add("hidden");
                logoutBtn.classList.add("hidden");
                setMessage(loginMessage, result?.error || "관리자 데이터를 불러오지 못했습니다.", "error");
                return;
            }

            cms = {
                notices: result.notices || [],
                activities: result.activities || [],
                tickerItems: result.tickerItems || [],
                siteSettings: result.siteSettings || {},
                qaItems: cms.qaItems || [],
            };

            loginPanel.classList.add("hidden");
            adminPanel.classList.remove("hidden");
            logoutBtn.classList.remove("hidden");
            fillSettings();
            renderAll();
            await loadQaItems();
        }

        function fillSettings() {
            $("#contactMessage").value = cms.siteSettings.contactMessage || "";
            $("#presidentPhone").value = cms.siteSettings.presidentPhone || "";
            $("#staffPhone").value = cms.siteSettings.staffPhone || "";
            $("#heroTitle").value = cms.siteSettings.heroTitle || "";
            $("#heroSubtitle").value = cms.siteSettings.heroSubtitle || "";
            $("#applyButtonText").value = cms.siteSettings.applyButtonText || "";
            $("#legalNotice").value = cms.siteSettings.legalNotice || "";
        }

        function collectSettings() {
            cms.siteSettings = {
                ...cms.siteSettings,
                contactMessage: $("#contactMessage").value,
                presidentPhone: $("#presidentPhone").value,
                staffPhone: $("#staffPhone").value,
                heroTitle: $("#heroTitle").value,
                heroSubtitle: $("#heroSubtitle").value,
                applyButtonText: $("#applyButtonText").value,
                legalNotice: $("#legalNotice").value,
            };
        }

        function entryCard(collectionName, item, index) {
            return `
                <article class="item" data-collection="${collectionName}" data-index="${index}">
                    <div class="item-head">
                        <span class="item-title">${collectionName === "notices" ? "공지" : "활동"} ${index + 1}</span>
                        <button class="danger small" data-delete="${collectionName}" data-index="${index}">삭제</button>
                    </div>
                    <div class="fields">
                        <div>
                            <label>제목</label>
                            <input data-field="title" value="${escapeAttr(item.title)}">
                        </div>
                        <div>
                            <label>날짜</label>
                            <input data-field="date" type="date" value="${escapeAttr(item.date)}">
                        </div>
                        <div class="field-full">
                            <label>요약</label>
                            <textarea data-field="summary">${escapeHtml(item.summary)}</textarea>
                        </div>
                        <div class="field-full">
                            <label>링크</label>
                            <input data-field="link" value="${escapeAttr(item.link)}">
                        </div>
                    </div>
                    <div class="checks">
                        <label><input data-field="pinned" type="checkbox" ${item.pinned ? "checked" : ""}>상단고정</label>
                        <label><input data-field="visible" type="checkbox" ${item.visible ? "checked" : ""}>공개</label>
                    </div>
                </article>
            `;
        }

        function tickerCard(item, index) {
            return `
                <article class="item" data-collection="tickerItems" data-index="${index}">
                    <div class="item-head">
                        <span class="item-title">티커 ${index + 1}</span>
                        <div>
                            <button class="small" data-move="up" data-index="${index}">위</button>
                            <button class="small" data-move="down" data-index="${index}">아래</button>
                            <button class="danger small" data-delete="tickerItems" data-index="${index}">삭제</button>
                        </div>
                    </div>
                    <div class="fields">
                        <div class="field-full">
                            <label>문구</label>
                            <input data-field="text" value="${escapeAttr(item.text)}">
                        </div>
                    </div>
                    <div class="checks">
                        <label><input data-field="visible" type="checkbox" ${item.visible ? "checked" : ""}>공개</label>
                    </div>
                </article>
            `;
        }

        function qaCard(item) {
            return `
                <article class="item" data-qa-id="${escapeAttr(item.id)}">
                    <div class="item-head">
                        <span class="item-title">${escapeHtml(item.title || "제목 없음")}</span>
                        <button class="danger small" data-delete-qa="${escapeAttr(item.id)}">삭제</button>
                    </div>
                    <div class="fields">
                        <div>
                            <label>작성자</label>
                            <input value="${escapeAttr(item.name)}" readonly>
                        </div>
                        <div>
                            <label>날짜</label>
                            <input value="${escapeAttr(item.date)}" readonly>
                        </div>
                        <div class="field-full">
                            <label>질문 내용</label>
                            <textarea readonly>${escapeHtml(item.content)}</textarea>
                        </div>
                        <div class="field-full">
                            <label>답변</label>
                            <textarea data-qa-field="answer">${escapeHtml(item.answer || "")}</textarea>
                        </div>
                    </div>
                    <div class="checks">
                        <label><input data-qa-field="answered" type="checkbox" ${item.answered ? "checked" : ""}>답변완료</label>
                        <label><input data-qa-field="visible" type="checkbox" ${item.visible !== false ? "checked" : ""}>공개</label>
                    </div>
                    <div style="margin-top:12px">
                        <button class="primary small" data-save-qa="${escapeAttr(item.id)}">답변 저장</button>
                    </div>
                </article>
            `;
        }

        function renderAll() {
            $("#noticesList").innerHTML = cms.notices.map((item, index) => entryCard("notices", item, index)).join("");
            $("#activitiesList").innerHTML = cms.activities.map((item, index) => entryCard("activities", item, index)).join("");
            $("#tickerItemsList").innerHTML = cms.tickerItems.map(tickerCard).join("");
            renderQaItems();
        }

        function renderQaItems() {
            const list = $("#qaAdminList");
            if (!list) return;
            list.innerHTML = cms.qaItems.length
                ? cms.qaItems.map(qaCard).join("")
                : '<p class="message">등록된 질문이 없습니다.</p>';
        }

        async function loadQaItems() {
            const response = await authorizedFetch("/api/admin/qa");
            const result = await response.json().catch(() => null);
            if (!response.ok || !result?.ok) {
                cms.qaItems = [];
                renderQaItems();
                return;
            }
            cms.qaItems = result.items || [];
            renderQaItems();
        }

        async function saveQaItem(id) {
            const node = document.querySelector(`[data-qa-id="${CSS.escape(id)}"]`);
            if (!node) return;
            const payload = {};
            node.querySelectorAll("[data-qa-field]").forEach((field) => {
                payload[field.dataset.qaField] = field.type === "checkbox" ? field.checked : field.value;
            });
            const response = await authorizedFetch(`/api/admin/qa/${encodeURIComponent(id)}`, {
                method: "PUT",
                body: JSON.stringify(payload),
            });
            const result = await response.json().catch(() => null);
            if (!response.ok || !result?.ok) {
                setMessage(saveMessage, result?.error || "Q&A 저장에 실패했습니다.", "error");
                return;
            }
            setMessage(saveMessage, "Q&A 답변이 저장되었습니다.", "success");
            await loadQaItems();
        }

        async function deleteQaItem(id) {
            const response = await authorizedFetch(`/api/admin/qa/${encodeURIComponent(id)}`, { method: "DELETE" });
            const result = await response.json().catch(() => null);
            if (!response.ok || !result?.ok) {
                setMessage(saveMessage, result?.error || "Q&A 삭제에 실패했습니다.", "error");
                return;
            }
            setMessage(saveMessage, "Q&A가 삭제되었습니다.", "success");
            await loadQaItems();
        }

        function syncCollectionFromDom(collectionName) {
            const nodes = document.querySelectorAll(`[data-collection="${collectionName}"]`);
            cms[collectionName] = [...nodes].map((node, index) => {
                const existing = cms[collectionName][Number(node.dataset.index)] || {};
                const item = { ...existing, order: index + 1 };
                node.querySelectorAll("[data-field]").forEach((field) => {
                    item[field.dataset.field] = field.type === "checkbox" ? field.checked : field.value;
                });
                return item;
            });
        }

        function syncAllFromDom() {
            syncCollectionFromDom("notices");
            syncCollectionFromDom("activities");
            syncCollectionFromDom("tickerItems");
            collectSettings();
        }

        async function saveCms() {
            syncAllFromDom();
            setMessage(saveMessage, "저장 중...");
            const response = await authorizedFetch("/api/admin/cms", {
                method: "PUT",
                body: JSON.stringify(cms),
            });
            const result = await response.json().catch(() => null);

            if (!response.ok || !result?.ok) {
                setMessage(saveMessage, result?.error || "저장에 실패했습니다.", "error");
                return;
            }

            cms = {
                notices: result.notices || [],
                activities: result.activities || [],
                tickerItems: result.tickerItems || [],
                siteSettings: result.siteSettings || {},
            };
            fillSettings();
            renderAll();
            setMessage(saveMessage, "저장되었습니다.", "success");
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function escapeAttr(value) {
            return escapeHtml(value).replace(/"/g, "&quot;");
        }

        document.addEventListener("click", (event) => {
            const tab = event.target.closest("[data-tab]");
            if (tab) {
                document.querySelectorAll("[data-tab]").forEach((button) => button.classList.toggle("active", button === tab));
                document.querySelectorAll("[data-panel]").forEach((panel) => panel.classList.toggle("hidden", panel.dataset.panel !== tab.dataset.tab));
            }

            const add = event.target.closest("[data-add]");
            if (add) {
                syncAllFromDom();
                const collection = add.dataset.add;
                cms[collection].push(collection === "tickerItems" ? emptyTicker() : emptyEntry());
                renderAll();
            }

            const del = event.target.closest("[data-delete]");
            if (del) {
                syncAllFromDom();
                cms[del.dataset.delete].splice(Number(del.dataset.index), 1);
                renderAll();
            }

            const move = event.target.closest("[data-move]");
            if (move) {
                syncAllFromDom();
                const index = Number(move.dataset.index);
                const direction = move.dataset.move === "up" ? -1 : 1;
                const next = index + direction;
                if (next >= 0 && next < cms.tickerItems.length) {
                    [cms.tickerItems[index], cms.tickerItems[next]] = [cms.tickerItems[next], cms.tickerItems[index]];
                    renderAll();
                }
            }

            const saveQa = event.target.closest("[data-save-qa]");
            if (saveQa) {
                saveQaItem(saveQa.dataset.saveQa);
            }

            const deleteQa = event.target.closest("[data-delete-qa]");
            if (deleteQa) {
                deleteQaItem(deleteQa.dataset.deleteQa);
            }
        });

        $("#loginBtn").addEventListener("click", login);
        $("#passwordInput").addEventListener("keydown", (event) => {
            if (event.key === "Enter") login();
        });
        $("#saveBtn").addEventListener("click", saveCms);
        $("#reloadQaBtn").addEventListener("click", loadQaItems);
        logoutBtn.addEventListener("click", () => {
            localStorage.removeItem(tokenKey);
            location.reload();
        });

        if (token()) {
            loadCms();
        }
    </script>
</body>
</html>
