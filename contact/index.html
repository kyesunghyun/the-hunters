<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의 | THE HUNTERS</title>
    <style>
        :root{--primary:#8f55ff;--gold:#bfa469;--text:#fff;--dim:#b6b3bd;--border:rgba(255,255,255,.12)}
        *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
        body{min-height:100vh;color:var(--text);background:radial-gradient(circle at 50% 0%,rgba(143,85,255,.13),transparent 30rem),linear-gradient(180deg,#050506,#0a0a0d 54%,#0b0910);animation:fade .15s ease-out both}
        body::after{content:"";position:fixed;inset:0;pointer-events:none;opacity:.026;background-image:radial-gradient(circle at 18% 24%,rgba(255,255,255,.95) 0 .7px,transparent .8px),radial-gradient(circle at 72% 64%,rgba(255,255,255,.72) 0 .6px,transparent .7px);background-size:5px 5px,7px 7px;mix-blend-mode:soft-light}
        nav{border-bottom:1px solid var(--border);background:rgba(5,5,6,.84);backdrop-filter:blur(18px)}.nav-inner,main{width:min(980px,calc(100% - 32px));margin:0 auto}.nav-inner{min-height:58px;display:flex;justify-content:space-between;align-items:center;gap:16px}a{color:inherit;text-decoration:none}.brand{font-weight:900;letter-spacing:2px}.links{display:flex;gap:16px;color:var(--dim);font-size:14px}
        main{padding:72px 0;min-height:calc(100vh - 58px);display:grid;align-content:center}.kicker{color:var(--gold);font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase}h1{font-size:clamp(34px,6vw,58px);line-height:1.05;margin:8px 0 22px}.lead{color:var(--dim);line-height:1.75;margin-bottom:24px}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{border:1px solid rgba(255,255,255,.095);border-radius:8px;background:rgba(10,10,13,.56);padding:20px}.card h2{font-size:22px;margin-bottom:8px}.card p{color:var(--dim);font-size:14px;line-height:1.65;margin-bottom:16px}.links-list{display:flex;flex-wrap:wrap;gap:8px}.pill,.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 13px;border:1px solid rgba(255,255,255,.12);border-radius:999px;background:rgba(255,255,255,.04);font-weight:900}.role{color:var(--dim);font-size:12px}.primary{border-color:rgba(143,85,255,.5);background:linear-gradient(135deg,var(--primary),#4a2f87)}
        @keyframes fade{from{opacity:0}to{opacity:1}}@media(max-width:760px){.grid{grid-template-columns:1fr}.links{font-size:12px;gap:10px}}
    </style>
</head>
<body>
    <nav><div class="nav-inner"><a class="brand" href="index.html">THE HUNTERS</a><div class="links"><a href="market.html">시장정보</a><a href="guide.html">안내</a><a href="apply.html">지원</a></div></div></nav>
    <main>
        <div class="kicker">Contact</div><h1>문의</h1><p class="lead" id="contactMessage">지원 및 활동 관련 문의는 아래 연락처로 부탁드립니다.</p>
        <section class="grid">
            <article class="card"><h2>빠른 문의</h2><p>바로 연락이 필요한 경우 아래 연락처를 이용해 주세요.</p><div class="links-list"><a class="pill" id="presidentPhoneLink" href="tel:010-2654-8333"><span class="role">회장</span><span id="presidentPhoneText">010-2654-8333</span></a><a class="pill" id="staffPhoneLink" href="tel:010-9496-5411"><span class="role">운영진</span><span id="staffPhoneText">010-9496-5411</span></a></div></article>
        </section>
    </main>
    <script>
        function phoneHref(v){const d=String(v||"").replace(/[^\d+]/g,"");return d?`tel:${d}`:"#"}
        fetch("/api/site-settings").then(r=>r.json()).then(j=>{const s=j?.siteSettings||{},p=s.presidentPhone||"010-2654-8333",t=s.staffPhone||"010-9496-5411";if(s.contactMessage)document.getElementById("contactMessage").textContent=s.contactMessage;document.getElementById("presidentPhoneText").textContent=p;document.getElementById("staffPhoneText").textContent=t;document.getElementById("presidentPhoneLink").href=phoneHref(p);document.getElementById("staffPhoneLink").href=phoneHref(t)}).catch(()=>{});
        document.addEventListener("click",e=>{if(e.target.closest("a,.btn,.pill")&&"vibrate"in navigator)navigator.vibrate(8)});
    </script>
</body>
</html>
