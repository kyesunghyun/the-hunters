<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE HUNTERS 지원서</title>

<style>

:root {
    --bg-color: linear-gradient(180deg,#0a0a0a,#121212,#1b1033);
    --text-color: #ffffff;
    --card-bg: rgba(255,255,255,0.05);
    --border-color: rgba(157,77,255,.25);
    --input-bg: #232323;
    --subtitle-color: #bdbdbd;
    --footer-color: #888;
    --btn-bg: #8b3dff;
    --btn-text: #ffffff;
}

body.light-mode {
    --bg-color: #f8f9fa;
    --text-color: #212529;
    --card-bg: #ffffff;
    --border-color: #dee2e6;
    --input-bg: #f1f3f5;
    --subtitle-color: #495057;
    --footer-color: #6c757d;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard',sans-serif;
}

body{
    background: var(--bg-color);
    color: var(--text-color);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px 15px;
    transition: background 0.3s, color 0.3s;
}

.container{
    width:100%;
    max-width:650px;
    position: relative;
}

.theme-toggle {
    position: absolute;
    top: -40px;
    right: 0;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    color: var(--text-color);
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    backdrop-filter: blur(15px);
    transition: 0.2s;
}

.theme-toggle:hover {
    background: var(--border-color);
}

.logo{
    width:180px;
    display:block;
    margin:0 auto 20px;
}

.title{
    text-align:center;
    color:#9d4dff;
    font-size:42px;
    font-weight:800;
    letter-spacing:2px;
}

.subtitle{
    text-align:center;
    color: var(--subtitle-color);
    margin-top:8px;
    margin-bottom:30px;
}

.card{
    background: var(--card-bg);
    backdrop-filter:blur(15px);
    border:1px solid var(--border-color);
    border-radius:24px;
    padding:30px;
    transition: background 0.3s, border 0.3s;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    font-weight:600;
}

input,
textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background: var(--input-bg);
    color: var(--text-color);
    font-size:15px;
    transition: background 0.3s, color 0.3s;
}

textarea{
    resize:none;
}

button{
    width:100%;
    margin-top:25px;
    padding:16px;
    border:none;
    border-radius:14px;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

.footer{
    text-align:center;
    margin-top:20px;
    color: var(--footer-color);
}

</style>
</head>

<body>

<div class="container">

    <button class="theme-toggle" id="themeToggle">Light Mode</button>

    <img src="logo.png" alt="THE HUNTERS" class="logo">

    <h1 class="title">THE HUNTERS</h1>

    <p class="subtitle">
        대한민국 대학생 주식투자 연합동아리
    </p>

    <div class="card">

        <form id="joinForm">

            <label>이름 / 생년월일 / 성별</label>
            <input
            type="text"
            placeholder="예) 김수진 / 030106 / 여자"
            required>

            <label>학교 / 학년(학번) / 학과</label>
            <input
            type="text"
            placeholder="예) 고려대학교 / 3학년(22학번) / 경영학과"
            required>

            <label>전화번호</label>
            <input
            type="tel"
            placeholder="010-0000-0000"
            required>

            <label>투자경력</label>
            <textarea
            rows="4"
            placeholder="예) 투자대회 참가 경험이 있습니다."
            required></textarea>

            <label>지원동기</label>
            <textarea
            rows="5"
            placeholder="더헌터스 지원동기를 작성해주세요."
            required></textarea>

            <button type="submit">
                지원하기
            </button>

        </form>

    </div>

    <div class="footer">
        © THE HUNTERS
    </div>

</div>

<script>

const themeToggle = document.getElementById("themeToggle");
const body = document.body;

// Check for saved theme preference
const currentTheme = localStorage.getItem("theme");
if (currentTheme === "light") {
    body.classList.add("light-mode");
    themeToggle.textContent = "Dark Mode";
}

themeToggle.addEventListener("click", () => {
    body.classList.toggle("light-mode");
    
    let theme = "dark";
    if (body.classList.contains("light-mode")) {
        theme = "light";
        themeToggle.textContent = "Dark Mode";
    } else {
        themeToggle.textContent = "Light Mode";
    }
    
    localStorage.setItem("theme", theme);
});

document.getElementById("joinForm").addEventListener("submit", function(e){

    e.preventDefault();

    alert(
`주식투자연합동아리 더헌터스 가등록 되셨습니다.

인원이 다 차면 카카오톡 단톡방에서 오티 진행합니다.

최근 금융사와의 협업을 위해 동아리명을 기존 키움헌터스에서 더헌터스로 변경한 점 참고 부탁드립니다!

기다려주셔서 감사합니다😊`
    );

    this.reset();
});

</script>

</body>
</html>
