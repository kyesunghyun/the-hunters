<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE HUNTERS | 대한민국 대학생 주식투자 연합동아리</title>
    <meta name="description" content="전국 100여 개 대학교, 1,500명 이상의 회원이 함께하는 대한민국 최대 규모의 대학생 주식투자 연합동아리 더헌터스입니다.">
    <style>
        :root {
            --primary: #8f55ff;
            --gold: #bfa469;
            --text: #fff;
            --dim: #b6b3bd;
            --border: rgba(255,255,255,0.12);
            --panel: rgba(12,12,15,0.68);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body {
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 50% 0%, rgba(95, 60, 150, 0.14), transparent 32rem),
                linear-gradient(180deg, #040405 0%, #09090b 48%, #0b0910 100%);
            overflow-x: hidden;
            animation: pageFadeIn 150ms ease-out both;
        }
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.028;
            background-image:
                radial-gradient(circle at 18% 24%, rgba(255,255,255,0.95) 0 0.7px, transparent 0.8px),
                radial-gradient(circle at 72% 64%, rgba(255,255,255,0.72) 0 0.6px, transparent 0.7px);
            background-size: 5px 5px, 7px 7px;
            mix-blend-mode: soft-light;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 20;
            border-bottom: 1px solid var(--border);
            background: rgba(5,5,6,0.84);
            backdrop-filter: blur(18px);
        }
        .nav-inner {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
        }
        .brand { color: var(--text); text-decoration: none; font-size: 20px; font-weight: 900; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 18px; align-items: center; }
        .nav-links a { color: var(--text); text-decoration: none; font-size: 14px; opacity: 0.84; }
        .nav-links a:hover { color: var(--primary); opacity: 1; }

        main {
            min-height: 100vh;
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 104px 0 42px;
            display: grid;
            place-items: center;
            text-align: center;
        }
        .hero { width: 100%; }
        .eyebrow {
            display: inline-flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            color: var(--gold);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 2.4px;
            text-transform: uppercase;
        }
        .eyebrow::before, .eyebrow::after { content: ""; width: 44px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
        .eyebrow::after { background: linear-gradient(90deg, var(--gold), transparent); }
        .emblem-scene {
            width: min(72vw, 520px);
            margin: 0 auto 22px;
            perspective: 900px;
            transform-style: preserve-3d;
            transition: transform 160ms cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform;
        }
        .hero-logo {
            width: 100%;
            display: block;
            border-radius: 50%;
            filter: drop-shadow(0 24px 36px rgba(0,0,0,0.58)) drop-shadow(0 0 10px rgba(143,85,255,0.10));
            transform-origin: 50% 50%;
            transform-style: preserve-3d;
            animation: premiumTurn 14s ease-in-out infinite;
            will-change: transform;
        }
        h1 {
            font-size: clamp(44px, 8vw, 86px);
            line-height: 0.94;
            margin-bottom: 22px;
            background: linear-gradient(115deg, #fff 0%, #d8d4df 42%, #9b76e8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: var(--dim);
            font-size: clamp(16px, 2vw, 20px);
            max-width: 720px;
            margin: 0 auto 28px;
            line-height: 1.75;
        }
        .hero-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            max-width: 680px;
            margin: 0 auto 28px;
        }
        .hero-stat {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 14px;
            background: var(--panel);
        }
        .hero-stat strong { display: block; font-size: 24px; }
        .hero-stat span { color: var(--dim); font-size: 12px; }
        .actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 18px;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 999px;
            color: var(--text);
            text-decoration: none;
            background: rgba(255,255,255,0.04);
            font-weight: 900;
            transition: transform 100ms cubic-bezier(0.2,0.8,0.2,1), border-color 0.2s, background 0.2s;
            touch-action: manipulation;
        }
        .btn.primary { border-color: rgba(143,85,255,0.5); background: linear-gradient(135deg, var(--primary), #4a2f87); }
        .is-pressed { transform: scale(0.975); }
        @keyframes premiumTurn { 0%, 100% { transform: rotateY(-11deg) rotateX(1deg) translateZ(0); } 50% { transform: rotateY(11deg) rotateX(-0.6deg) translateZ(12px); } }
        @keyframes pageFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 760px) {
            .nav-links { gap: 10px; }
            .nav-links a { font-size: 12px; }
            .hero-stats { grid-template-columns: 1fr; }
        }
        @media (prefers-reduced-motion: reduce) {
            body, .hero-logo { animation: none; }
            .emblem-scene, .btn { transition: none; }
            .is-pressed { transform: none; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="index.html" class="brand">THE HUNTERS</a>
            <div class="nav-links">
                <a href="market.html">시장정보</a>
                <a href="guide.html">안내</a>
                <a href="contact.html">문의</a>
                <a href="qa.html">Q&A</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="eyebrow">Premium Investment Network</div>
            <div class="emblem-scene" aria-label="THE HUNTERS emblem">
                <img src="logo3.png" alt="THE HUNTERS" class="hero-logo">
            </div>
            <h1 id="heroTitle">THE HUNTERS</h1>
            <p class="subtitle" id="heroSubtitle">전국 100여 개 대학교, 1,500명 이상의 회원이 함께하는<br>대한민국 최대 규모의 대학생 주식투자 연합동아리입니다.</p>
            <div class="hero-stats">
                <div class="hero-stat"><strong>100+</strong><span>참여 대학교</span></div>
                <div class="hero-stat"><strong>1,500+</strong><span>누적 네트워크</span></div>
                <div class="hero-stat"><strong>Stock</strong><span>투자 교육 및 네트워크</span></div>
            </div>
            <div class="actions">
                <a href="apply.html" class="btn primary" id="applyButton">지금 지원하기</a>
                <a href="market.html" class="btn">시장정보 보기</a>
                <a href="contact.html" class="btn">문의하기</a>
            </div>
        </section>
    </main>

    <script>
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
        const emblemScene = document.querySelector(".emblem-scene");
        let tapAudioContext;

        function escapeHtml(value) {
            return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function richText(value) {
            return escapeHtml(String(value ?? "").replace(/<br\s*\/?>/gi, "\n")).replace(/\n/g, "<br>");
        }

        async function loadSiteSettings() {
            const response = await fetch("/api/site-settings", { headers: { "Accept": "application/json" } });
            const result = await response.json().catch(() => null);
            if (!response.ok || !result?.ok) return;
            if (result.siteSettings?.heroTitle) document.getElementById("heroTitle").textContent = result.siteSettings.heroTitle;
            if (result.siteSettings?.heroSubtitle) document.getElementById("heroSubtitle").innerHTML = richText(result.siteSettings.heroSubtitle);
            if (result.siteSettings?.applyButtonText) document.getElementById("applyButton").textContent = result.siteSettings.applyButtonText;
        }

        function playSoftTap() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                tapAudioContext ||= new AudioContext();
                const now = tapAudioContext.currentTime;
                const oscillator = tapAudioContext.createOscillator();
                const gain = tapAudioContext.createGain();
                oscillator.type = "sine";
                oscillator.frequency.setValueAtTime(420, now);
                oscillator.frequency.exponentialRampToValueAtTime(220, now + 0.055);
                gain.gain.setValueAtTime(0.0001, now);
                gain.gain.exponentialRampToValueAtTime(0.036, now + 0.008);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.075);
                oscillator.connect(gain);
                gain.connect(tapAudioContext.destination);
                oscillator.start(now);
                oscillator.stop(now + 0.08);
            } catch (_) {}
        }

        document.addEventListener("pointerdown", (event) => {
            const target = event.target.closest(".btn");
            if (!target || reduceMotion.matches) return;
            target.classList.add("is-pressed");
        });
        ["pointerup", "pointercancel", "pointerleave"].forEach((type) => {
            document.addEventListener(type, (event) => event.target.closest(".btn")?.classList.remove("is-pressed"));
        });
        document.addEventListener("click", (event) => {
            if (!event.target.closest(".btn, .nav-links a")) return;
            if ("vibrate" in navigator) navigator.vibrate(8);
            playSoftTap();
        });

        function initLogoTilt() {
            if (!emblemScene || reduceMotion.matches || !window.matchMedia("(hover: hover) and (pointer: fine)").matches) return;
            emblemScene.addEventListener("pointermove", (event) => {
                const rect = emblemScene.getBoundingClientRect();
                const x = (event.clientX - rect.left) / rect.width - 0.5;
                const y = (event.clientY - rect.top) / rect.height - 0.5;
                emblemScene.style.transform = `rotateX(${(-y * 2).toFixed(2)}deg) rotateY(${(x * 2).toFixed(2)}deg)`;
            });
            emblemScene.addEventListener("pointerleave", () => { emblemScene.style.transform = ""; });
        }

        loadSiteSettings();
        initLogoTilt();
    </script>
</body>
</html>
