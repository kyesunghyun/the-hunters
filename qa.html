<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A | THE HUNTERS</title>
    <meta name="description" content="THE HUNTERS 지원 및 활동 관련 비밀 Q&A 게시판입니다.">
    <style>
        :root {
            --bg: #050506;
            --panel: rgba(12, 12, 15, 0.72);
            --border: rgba(255,255,255,0.11);
            --text: #fff;
            --dim: #b6b3bd;
            --purple: #8f55ff;
            --success: #7bd8a4;
            --danger: #ff8c8c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 50% 0%, rgba(143, 85, 255, 0.13), transparent 30rem),
                linear-gradient(180deg, #050506, #0a0a0d 54%, #0b0910);
            line-height: 1.6;
        }

        nav {
            border-bottom: 1px solid var(--border);
            background: rgba(5, 5, 6, 0.84);
            backdrop-filter: blur(16px);
        }

        .nav-inner,
        main {
            width: min(1100px, calc(100% - 32px));
            margin: 0 auto;
        }

        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
        }

        .brand,
        .back {
            color: var(--text);
            text-decoration: none;
            font-weight: 800;
        }

        .back {
            color: var(--dim);
            font-size: 14px;
        }

        main {
            padding: 58px 0 80px;
        }

        .hero {
            margin-bottom: 28px;
        }

        .eyebrow {
            color: #bfa469;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        h1 {
            font-size: clamp(34px, 6vw, 58px);
            line-height: 1.05;
            margin-bottom: 14px;
        }

        .lead,
        .notice {
            color: var(--dim);
            max-width: 760px;
        }

        .notice {
            margin-top: 8px;
            font-size: 14px;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 390px;
            gap: 18px;
            align-items: start;
        }

        .panel {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            padding: 22px;
        }

        .panel h2 {
            font-size: 22px;
            margin-bottom: 16px;
        }

        .qa-list {
            display: grid;
            gap: 10px;
        }

        .qa-item {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.095);
            border-radius: 8px;
            padding: 16px;
            background: rgba(255,255,255,0.035);
            color: var(--text);
            text-align: left;
            cursor: pointer;
        }

        .qa-item:hover {
            border-color: rgba(143, 85, 255, 0.38);
        }

        .qa-meta {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            color: var(--dim);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .status {
            color: var(--dim);
            font-weight: 800;
        }

        .status.done {
            color: var(--success);
        }

        .secret {
            color: #c8b6ff;
            font-size: 12px;
            margin-top: 8px;
        }

        label {
            display: block;
            color: var(--dim);
            font-size: 12px;
            font-weight: 800;
            margin: 12px 0 6px;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.055);
            color: var(--text);
            padding: 12px;
            font-size: 14px;
        }

        textarea {
            min-height: 130px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: rgba(143, 85, 255, 0.52);
        }

        .check {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            color: var(--dim);
            font-size: 13px;
            margin-top: 14px;
        }

        .check input {
            width: auto;
            margin-top: 4px;
        }

        button {
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text);
            padding: 12px 14px;
            font-weight: 800;
            cursor: pointer;
        }

        button.primary {
            width: 100%;
            margin-top: 16px;
            border-color: rgba(143, 85, 255, 0.45);
            background: linear-gradient(135deg, var(--purple), #4a2f87);
        }

        .message {
            min-height: 22px;
            margin-top: 12px;
            color: var(--dim);
            font-size: 14px;
        }

        .message.error { color: var(--danger); }
        .message.success { color: var(--success); }

        dialog {
            width: min(560px, calc(100% - 28px));
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #101014;
            color: var(--text);
            padding: 0;
            margin: auto;
        }

        dialog::backdrop {
            background: rgba(0,0,0,0.72);
        }

        .dialog-inner {
            padding: 22px;
        }

        .dialog-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 18px;
        }

        .detail-box {
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 8px;
            padding: 14px;
            background: rgba(255,255,255,0.035);
            margin-top: 14px;
            color: var(--dim);
            white-space: pre-wrap;
        }

        @media (max-width: 820px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a class="brand" href="/">THE HUNTERS</a>
            <a class="back" href="/">홈으로</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="eyebrow">Private Q&A</div>
            <h1>Q&A 게시판</h1>
            <p class="lead">지원 및 활동 관련 문의를 남겨주시면 운영진이 확인 후 답변드립니다.</p>
            <p class="notice">작성한 질문은 비밀번호 입력 후 본인만 확인할 수 있습니다.</p>
        </section>

        <section class="layout">
            <div class="panel">
                <h2>질문 목록</h2>
                <div id="qaList" class="qa-list">
                    <p class="message">질문 목록을 불러오는 중입니다.</p>
                </div>
            </div>

            <form id="qaForm" class="panel">
                <h2>질문 작성</h2>
                <label for="name">이름 또는 닉네임</label>
                <input id="name" name="name" required maxlength="30" autocomplete="name">

                <label for="password">비밀번호</label>
                <input id="password" name="password" type="password" required minlength="4" autocomplete="new-password">

                <label for="title">제목</label>
                <input id="title" name="title" required maxlength="80">

                <label for="content">질문 내용</label>
                <textarea id="content" name="content" required></textarea>

                <label class="check">
                    <input id="privacyConsent" name="privacyConsent" type="checkbox" required>
                    <span>질문 확인 및 답변을 위해 입력한 정보를 저장하는 데 동의합니다.</span>
                </label>

                <button class="primary" type="submit">질문 등록</button>
                <p id="formMessage" class="message"></p>
            </form>
        </section>
    </main>

    <dialog id="detailDialog">
        <div class="dialog-inner">
            <h2 id="dialogTitle">질문 확인</h2>
            <p class="notice">작성 시 입력한 비밀번호를 입력해 주세요.</p>
            <label for="verifyPassword">비밀번호</label>
            <input id="verifyPassword" type="password">
            <div id="detailContent"></div>
            <p id="dialogMessage" class="message"></p>
            <div class="dialog-actions">
                <button id="closeDialog" type="button">닫기</button>
                <button id="verifyBtn" class="primary" type="button" style="width:auto;margin-top:0">확인</button>
            </div>
        </div>
    </dialog>

    <script>
        const qaList = document.getElementById("qaList");
        const qaForm = document.getElementById("qaForm");
        const formMessage = document.getElementById("formMessage");
        const detailDialog = document.getElementById("detailDialog");
        const dialogTitle = document.getElementById("dialogTitle");
        const verifyPassword = document.getElementById("verifyPassword");
        const detailContent = document.getElementById("detailContent");
        const dialogMessage = document.getElementById("dialogMessage");
        let currentId = "";

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function setMessage(element, text, type = "") {
            element.textContent = text;
            element.className = `message ${type}`.trim();
        }

        async function loadQa() {
            const response = await fetch("/api/qa", { headers: { "Accept": "application/json" } });
            const result = await response.json().catch(() => null);
            if (!response.ok || !result?.ok) {
                qaList.innerHTML = '<p class="message error">질문 목록을 불러오지 못했습니다.</p>';
                return;
            }

            if (!result.items.length) {
                qaList.innerHTML = '<p class="message">등록된 질문이 없습니다.</p>';
                return;
            }

            qaList.innerHTML = result.items.map((item) => `
                <button class="qa-item" type="button" data-id="${escapeHtml(item.id)}" data-title="${escapeHtml(item.title)}">
                    <div class="qa-meta">
                        <span>${escapeHtml(item.date)} · ${escapeHtml(item.maskedName)}</span>
                        <span class="status ${item.answered ? "done" : ""}">${item.answered ? "답변완료" : "답변대기"}</span>
                    </div>
                    <strong>${escapeHtml(item.title)}</strong>
                    <div class="secret">비밀글</div>
                </button>
            `).join("");
        }

        qaForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            setMessage(formMessage, "등록 중입니다.");
            const payload = Object.fromEntries(new FormData(qaForm).entries());
            payload.privacyConsent = document.getElementById("privacyConsent").checked;

            const response = await fetch("/api/qa", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });
            const result = await response.json().catch(() => null);

            if (!response.ok || !result?.ok) {
                setMessage(formMessage, result?.error || "질문 등록에 실패했습니다.", "error");
                return;
            }

            qaForm.reset();
            setMessage(formMessage, "질문이 등록되었습니다.", "success");
            loadQa();
        });

        qaList.addEventListener("click", (event) => {
            const item = event.target.closest("[data-id]");
            if (!item) return;
            currentId = item.dataset.id;
            dialogTitle.textContent = item.dataset.title || "질문 확인";
            verifyPassword.value = "";
            detailContent.innerHTML = "";
            setMessage(dialogMessage, "");
            detailDialog.showModal();
        });

        document.getElementById("closeDialog").addEventListener("click", () => detailDialog.close());
        document.getElementById("verifyBtn").addEventListener("click", async () => {
            setMessage(dialogMessage, "확인 중입니다.");
            const response = await fetch(`/api/qa/${encodeURIComponent(currentId)}/verify`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password: verifyPassword.value }),
            });
            const result = await response.json().catch(() => null);

            if (!response.ok || !result?.ok) {
                setMessage(dialogMessage, result?.error || "확인할 수 없습니다.", "error");
                return;
            }

            const item = result.item;
            detailContent.innerHTML = `
                <div class="detail-box">${escapeHtml(item.content)}</div>
                <h3 style="margin-top:18px">운영진 답변</h3>
                <div class="detail-box">${item.answered ? escapeHtml(item.answer) : "관리자 답변 대기중"}</div>
            `;
            setMessage(dialogMessage, "확인되었습니다.", "success");
        });

        loadQa();
    </script>
</body>
</html>
