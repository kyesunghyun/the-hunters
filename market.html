<head>

    <link href="https://fonts.googleapis.com/css2?family=Grandiflora+One&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#8f55ff; --gold:#bfa469; --text:#fff; --dim:#b6b3bd; --border:rgba(255,255,255,.12); --positive:#7bd8a4; --negative:#ff8c8c; }
        * { box-sizing:border-box; margin:0; padding:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
        body { min-height:100vh; color:var(--text); background:radial-gradient(circle at 50% 0%,rgba(143,85,255,.14),transparent 30rem),linear-gradient(180deg,#050506,#0a0a0d 54%,#0b0910); animation:fade .15s ease-out both; }
        body::after { content:""; position:fixed; inset:0; pointer-events:none; opacity:.026; background-image:radial-gradient(circle at 18% 24%,rgba(255,255,255,.95) 0 .7px,transparent .8px),radial-gradient(circle at 72% 64%,rgba(255,255,255,.72) 0 .6px,transparent .7px); background-size:5px 5px,7px 7px; mix-blend-mode:soft-light; }
        nav { border-bottom:1px solid var(--border); background:rgba(5,5,6,.84); backdrop-filter:blur(18px); }
        .nav-inner, main { width:min(1100px,calc(100% - 32px)); margin:0 auto; }
        .nav-inner { min-height:58px; display:flex; justify-content:space-between; align-items:center; gap:16px; }
        a { color:inherit; text-decoration:none; }
        .brand { font-weight:900; letter-spacing:2px; }
        .links { display:flex; gap:16px; color:var(--dim); font-size:14px; }
        main { padding:58px 0 70px; }
        .kicker { color:var(--gold); font-size:12px; font-weight:900; letter-spacing:2px; text-transform:uppercase; }
        h1 { font-size:clamp(34px,6vw,58px); line-height:1.05; margin:8px 0 20px; }
        .market-header { display:flex; justify-content:space-between; align-items:end; gap:18px; margin-bottom:18px; }
        .note { color:var(--dim); font-size:13px; text-align:right; }
        .session { display:inline-flex; align-items:center; gap:8px; margin-top:8px; color:var(--dim); font-size:12px; font-weight:900; }
        .dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.34); box-shadow:0 0 0 3px rgba(255,255,255,.055); }
        .session.open { color:var(--positive); }
        .session.open .dot { background:var(--positive); box-shadow:0 0 0 3px rgba(123,216,164,.11); }
        .grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
        .card,.status { min-height:138px; padding:18px; border:1px solid rgba(255,255,255,.095); border-radius:8px; background:rgba(10,10,13,.64); box-shadow:inset 0 1px 0 rgba(255,255,255,.045); }
        .card.wide { grid-column:span 2; }
        .top { display:flex; justify-content:space-between; gap:12px; margin-bottom:10px; }
        .name { font-size:13px; font-weight:900; }
        .change { font-size:12px; font-weight:900; }
        .up { color:var(--positive); } .down { color:var(--negative); } .neutral { color:var(--dim); }
        .value { font-size:26px; font-weight:900; line-height:1.05; }
        .meta { margin-top:6px; color:var(--dim); font-size:12px; }
        .source { margin-top:12px; color:rgba(255,255,255,.42); font-size:11px; }
        .sparkline { width:100%; height:34px; margin-top:14px; } .sparkline path { fill:none; stroke:rgba(143,85,255,.85); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .ticker { margin-top:28px; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:rgba(10,10,13,.56); }
        .ticker-label { padding:13px 18px; color:var(--gold); font-size:12px; font-weight:900; letter-spacing:1.6px; border-bottom:1px solid rgba(255,255,255,.08); }
        .ticker-window { overflow:hidden; }
        .ticker-track { display:flex; gap:34px; width:max-content; padding:14px 18px; color:var(--dim); font-size:13px; animation:ticker 36s linear infinite; }
        .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:24px; }
        .btn { padding:11px 16px; border:1px solid rgba(255,255,255,.14); border-radius:999px; background:rgba(255,255,255,.04); font-weight:900; }
        .primary { border-color:rgba(143,85,255,.5); background:linear-gradient(135deg,var(--primary),#4a2f87); }
        @keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} } @keyframes fade{from{opacity:0}to{opacity:1}}
        @media(max-width:820px){.market-header{display:block}.note{text-align:left;margin-top:12px}.grid{grid-template-columns:1fr}.card.wide{grid-column:auto}.links{font-size:12px;gap:10px}}
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav><div class="nav-inner"><a class="brand" href="/">THE HUNTERS</a><div class="nav-links"><a href="/">HOME</a><a href="/about">ABOUT</a><a href="/contents">CONTENTS</a><a href="/market.html">MARKET</a><a href="/qa.html">Q&A</a><a href="/contact">CONTACT</a></div></div></nav>
    <main>
        <div class="market-header">
            <div><div class="kicker">Market Snapshot</div><h1>오늘의 시장 흐름</h1></div>
            <div class="note"><p id="updatedAt">불러오는 중</p><p class="session" id="session"><span class="dot"></span><span>MARKET CLOSED</span></p></div>
        </div>
        <div class="grid" id="marketGrid"><div class="status">시장 정보를 불러오는 중입니다.</div></div>
        <section class="ticker"><div class="ticker-label">THE HUNTERS Market Note</div><div class="ticker-window"><div class="ticker-track" id="tickerTrack"></div></div></section>
        <div class="actions"><a class="btn primary" href="/contents/">콘텐츠 읽기</a><a class="btn" href="/disclaimer/">투자 고지 보기</a><a class="btn" href="/contact/">문의하기</a></div>
    </main>
    <footer class="site-footer"><div><strong>THE HUNTERS</strong><p>시장 정보는 교육 목적의 참고 자료이며 투자 권유가 아닙니다.</p></div><div class="footer-links"><a href="/privacy/">Privacy</a><a href="/terms/">Terms</a><a href="/disclaimer/">Disclaimer</a><a href="/contact/">Contact</a></div></footer>
    <script>
        const grid=document.getElementById("marketGrid"), updatedAt=document.getElementById("updatedAt"), session=document.getElementById("session"), tickerTrack=document.getElementById("tickerTrack");
        function escapeHtml(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
        function formatUpdatedAt(v){const d=new Date(v);return Number.isNaN(d.getTime())?"업데이트 시간 확인 불가":`마지막 업데이트: ${d.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}`;}
        function kstParts(date=new Date()){const k=new Date(date.getTime()+9*60*60*1000);return{year:k.getUTCFullYear(),month:k.getUTCMonth(),date:k.getUTCDate(),day:k.getUTCDay(),time:k.getUTCHours()*60+k.getUTCMinutes()};}
        function kstToLocal(p,m){return new Date(Date.UTC(p.year,p.month,p.date,0,m-9*60));}
        function nextOpen(from=new Date()){const p=kstParts(from);let add=0,day=p.day;if(day>=1&&day<=5&&p.time<540)return kstToLocal(p,540);do{add++;day=(p.day+add)%7}while(day===0||day===6);return kstToLocal({...p,date:p.date+add},540);}
        function duration(ms){const min=Math.max(0,Math.floor(ms/60000)),d=Math.floor(min/1440),h=Math.floor(min%1440/60),m=min%60;return d?`${d}일 ${h}시간`:h?`${h}시간 ${m}분`:`${m}분`;}
        function updateSession(){const now=new Date(),p=kstParts(now),open=p.day>=1&&p.day<=5&&p.time>=540&&p.time<=930,label=session.querySelector("span:last-child");session.classList.toggle("open",open);label.textContent=open?"MARKET OPEN":`MARKET CLOSED · NEXT OPEN ${duration(nextOpen(now)-now)}`;}
        async function load(){try{const r=await fetch("/api/market",{headers:{Accept:"application/json"}}),j=await r.json();if(!r.ok||!j.ok)throw new Error(j?.error||"시장 정보를 불러오지 못했습니다.");updatedAt.textContent=formatUpdatedAt(j.updatedAt);grid.innerHTML=j.items.map(item=>{const trend=Array.isArray(item.trend)&&item.trend.length>1?`<svg class="sparkline" viewBox="0 0 94 32" preserveAspectRatio="none"><path d="${escapeHtml(item.trend)}"></path></svg>`:"";const change=item.changePercent?`${item.change||""} (${item.changePercent})`:item.change||"변동 정보 없음";return`<article class="card${item.wide?" wide":""}"><div class="top"><span class="name">${escapeHtml(item.name)}</span><span class="change ${escapeHtml(item.tone||"neutral")}">${escapeHtml(change)}</span></div><div class="value">${escapeHtml(item.value)}</div><div class="meta">${escapeHtml(item.meta)}</div><div class="source">Source: ${escapeHtml(item.source||"External API")}</div>${trend}</article>`}).join("");}catch(e){updatedAt.textContent="업데이트 지연";grid.innerHTML=`<div class="status">${escapeHtml(e.message||"실시간 정보를 불러오지 못했습니다.")}</div>`;}}
        async function settings(){const r=await fetch("/api/site-settings"),j=await r.json().catch(()=>null);const items=(j?.tickerItems||[]).filter(i=>i.visible!==false&&String(i.text||"").trim());const base=items.length?items:[{text:"KOSPI 시장 흐름 업데이트"},{text:"NASDAQ 변동성 확대"},{text:"USD/KRW 환율 체크"},{text:"글로벌 증시 주요 이슈 모니터링"}];tickerTrack.innerHTML=[...base,...base].map(i=>`<span>${escapeHtml(i.text)}</span>`).join("");}
        document.addEventListener("click",e=>{if(!e.target.closest("a,.btn"))return;if("vibrate"in navigator)navigator.vibrate(8);});
        updateSession();setInterval(updateSession,60000);load();settings();
    </script>
    <script src="header-scroll.js"></script>
</body>
</html>
