<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지원하기 | THE HUNTERS</title>
    <style>
        :root{--primary:#8f55ff;--primary-hover:#9a68ff;--gold:#bfa469;--text:#fff;--dim:#b6b3bd;--border:rgba(255,255,255,.12);--gold-border:rgba(191,164,105,.22)}
        *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
        body{min-height:100vh;color:var(--text);background:radial-gradient(circle at 50% 0%,rgba(143,85,255,.13),transparent 30rem),linear-gradient(180deg,#050506,#0a0a0d 54%,#0b0910);animation:fade .15s ease-out both}
        nav{border-bottom:1px solid var(--border);background:rgba(5,5,6,.84);backdrop-filter:blur(18px)}.nav-inner,main{width:min(760px,calc(100% - 32px));margin:0 auto}.nav-inner{min-height:58px;display:flex;justify-content:space-between;align-items:center;gap:16px}a{color:inherit;text-decoration:none}.brand{font-weight:900;letter-spacing:2px}.links{display:flex;gap:16px;color:var(--dim);font-size:14px}
        main{padding:58px 0 76px}.kicker{color:var(--gold);font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase}h1{font-size:clamp(34px,6vw,58px);line-height:1.05;margin:8px 0 22px}.card{border:1px solid var(--gold-border);border-radius:8px;background:rgba(10,10,13,.56);padding:24px}
        label{display:block;margin-top:18px;margin-bottom:8px;font-weight:700}input,textarea{width:100%;padding:14px;border:1px solid rgba(255,255,255,.09);border-radius:8px;background:rgba(255,255,255,.075);color:#fff;font-size:15px}textarea{resize:vertical}.gender{display:flex;gap:18px}.gender label{display:flex;align-items:center;gap:8px;margin:0}.gender input{width:auto}button{width:100%;margin-top:26px;padding:16px;border:0;border-radius:8px;background:linear-gradient(135deg,var(--primary),#3a256f);color:#fff;font-size:17px;font-weight:900;cursor:pointer}
        #legalModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:20;justify-content:center;align-items:center;padding:20px}.modal{width:min(500px,100%);max-height:90vh;overflow:auto;border:1px solid var(--gold-border);border-radius:8px;background:linear-gradient(145deg,#17171b,#0c0c0f);padding:28px}.modal-text{white-space:pre-wrap;color:var(--dim);font-size:14px;line-height:1.6}.modal-btns{display:flex;gap:10px}.modal-btns button{margin-top:18px}
        @keyframes fade{from{opacity:0}to{opacity:1}}@media(max-width:760px){.links{font-size:12px;gap:10px}.gender,.modal-btns{flex-direction:column}}
    </style>
</head>
<body>
    <nav><div class="nav-inner"><a class="brand" href="index.html">THE HUNTERS</a><div class="links"><a href="guide.html">안내</a><a href="contact.html">문의</a><a href="qa.html">Q&A</a></div></div></nav>
    <main>
        <div class="kicker">Apply</div><h1>지원하기</h1>
        <div class="card">
            <form id="joinForm" action="/api/apply" method="POST">
                <input type="hidden" name="legal_agreement" id="legalAgreementInput" value="해당없음">
                <input type="hidden" name="summary" id="summaryInput">
                <label>이름 / 생년월일</label><input type="text" name="name_birth" id="nameBirth" placeholder="예) 김수진 / 030106" required>
                <label>성별</label><div class="gender"><label><input type="radio" name="gender" value="남자" required> 남자</label><label><input type="radio" name="gender" value="여자" required> 여자</label></div>
                <label>학교 / 학년(학번) / 학과</label><input type="text" name="school_year_major" id="schoolInfo" placeholder="예) 고려대학교 / 3학년(22학번) / 경영학과" required>
                <label>전화번호</label><input type="tel" name="phone" id="phone" placeholder="010-0000-0000" required>
                <label>투자경력</label><textarea name="experience" rows="4" placeholder="예) 투자대회 참가 경험이 있습니다." required></textarea>
                <label>지원동기</label><textarea name="motivation" rows="5" placeholder="더헌터스 지원동기를 작성해주세요." required></textarea>
                <button type="submit">지원하기</button>
            </form>
        </div>
    </main>
    <div id="legalModal"><div class="modal"><h2 style="color:var(--primary);margin-bottom:16px">지원자 유의사항</h2><div class="modal-text" id="legalNoticeText">동아리 오티방 초대 전에
유의사항이 있어 전달해드립니다.

저희 동아리는 온라인 활동을 병행하고 있어
욕설, 비방, 명예훼손 등 타인을 침해하는 행위를
예방하기 위해 활동 시작 전에 준수사항을 안내드립니다.</div><div class="modal-btns"><button id="agreeBtn">동의</button><button id="disagreeBtn" type="button">비동의</button></div></div></div>
    <script>
        const form=document.getElementById("joinForm"),legalModal=document.getElementById("legalModal"),agreeBtn=document.getElementById("agreeBtn"),disagreeBtn=document.getElementById("disagreeBtn"),legalAgreementInput=document.getElementById("legalAgreementInput"),summaryInput=document.getElementById("summaryInput");
        fetch("/api/site-settings").then(r=>r.json()).then(j=>{if(j?.siteSettings?.legalNotice)document.getElementById("legalNoticeText").textContent=j.siteSettings.legalNotice;if(j?.siteSettings?.applyButtonText)form.querySelector('button[type="submit"]').textContent=j.siteSettings.applyButtonText}).catch(()=>{});
        function generateSummary(){const name=document.getElementById("nameBirth").value.split("/")[0].trim(),school=document.getElementById("schoolInfo").value.split("/")[0].trim(),phone=document.getElementById("phone").value,gender=form.querySelector('input[name="gender"]:checked').value;let gen="기";if(gender==="여자")gen+="여";return `${name} ${school} ${gen} ${phone}`}
        form.addEventListener("submit",e=>{e.preventDefault();summaryInput.value=generateSummary();legalModal.style.display="flex"});
        agreeBtn.onclick=()=>{legalAgreementInput.value="동의함";legalModal.style.display="none";summaryInput.value=generateSummary();submitFormData(new FormData(form))};
        disagreeBtn.onclick=()=>{alert("유의사항 미동의로 동아리 가입이 제한될 수 있습니다.");legalModal.style.display="none"};
        async function submitFormData(data){const button=form.querySelector('button[type="submit"]'),original=button.textContent;button.disabled=true;button.textContent="보내는 중...";try{const response=await fetch(form.action,{method:"POST",body:data});if(!response.ok){const result=await response.json().catch(()=>null);throw new Error(result?.error||"전송 실패")}alert(`주식투자연합동아리 더헌터스 지원이 완료되었습니다.\n\n인원이 다 차면 카카오톡 단톡방에서 오티 진행합니다.\n\n최근 금융사와의 협업을 위해 동아리명을 기존 키움헌터스에서 더헌터스로 변경한 점 참고 부탁드립니다!\n\n기다려주셔서 감사합니다`);form.reset();legalAgreementInput.value="해당없음"}catch(e){alert("전송 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.")}finally{button.disabled=false;button.textContent=original}}
        document.addEventListener("click",e=>{if(e.target.closest("a,button")&&"vibrate"in navigator)navigator.vibrate(8)});
    </script>
</body>
</html>
